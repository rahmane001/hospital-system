openapi: 3.0.0
info:
  title: Hospital System API
  version: 1.0.0
  description: API documentation for Hospital Backend System
servers:
  - url: http://localhost:5000
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
      responses:
        201:
          description: User created successfully
        400:
          description: User already exists / validation error

  /api/auth/login:
    post:
      summary: Login user and get token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Successful login, returns JWT token
        401:
          description: Invalid credentials

  /api/users:
    get:
      summary: Get all users (admin only)
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of users
        403:
          description: Not authorized as admin

  /api/users/{id}:
    delete:
      summary: Delete a user by ID (admin only)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User removed
        403:
          description: Not authorized as admin / cannot delete admin
        404:
          description: User not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
