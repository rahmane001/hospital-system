openapi: 3.0.0
info:
  title: Hospital System API
  version: 1.0.0
  description: API documentation for Hospital System project

servers:
  - url: http://localhost:5000/api

paths:
  /users:
    get:
      summary: Get all users (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users

  /users/{id}:
    get:
      summary: Get user by ID (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details

    put:
      summary: Update user (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                role:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated user

    delete:
      summary: Delete user (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User deleted

  /users/me:
    put:
      summary: Update logged-in user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated user profile

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
